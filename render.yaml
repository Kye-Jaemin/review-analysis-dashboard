services:
  - type: web
    name: review-dashboard
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: DATABASE_URL
        fromDatabase:
          name: review-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-haiku-4-5-20251001
      - key: ANTHROPIC_ALLOWED_MODELS
        value: claude-haiku-4-5-20251001,claude-sonnet-4-6,claude-opus-4-7
      - key: REDDIT_CLIENT_ID
        sync: false
      - key: REDDIT_CLIENT_SECRET
        sync: false
      - key: REDDIT_USER_AGENT
        sync: false
      - key: SCRAPER_USER_AGENT
        value: review-collector-bot/0.1
      # Playwright is OFF on free plan (512MB OOM risk).
      # To enable dynamic URL scraping:
      #   1) flip PLAYWRIGHT_ENABLED to "true"
      #   2) prepend the build command with: playwright install chromium --with-deps &&
      - key: PLAYWRIGHT_ENABLED
        value: "false"
      - key: DEFAULT_LANGUAGE
        value: en
      - key: APP_ENV
        value: production

databases:
  - name: review-db
    plan: free
    databaseName: reviews
    user: reviews
